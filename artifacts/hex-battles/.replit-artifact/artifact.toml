kind = "mobile"
previewPath = "/"
title = "Hex Battles"
version = "1.0.0"
id = "artifacts/hex-battles"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24998

[services.development]
run = "pnpm --filter @workspace/hex-battles run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hex-battles", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/hex-battles", "run", "serve" ]

[services.env]
PORT = "24998"
BASE_PATH = "/"
